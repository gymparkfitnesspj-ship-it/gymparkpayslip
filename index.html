<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymPark Fitness — Pay Slip Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --dark: #0A0A0A;
    --surface: #141414;
    --surface2: #1E1E1E;
    --border: #2A2A2A;
    --text: #F0EDE8;
    --muted: #888;
    --accent: #C9A84C;
    --red: #E05A5A;
    --green: #5ABA8A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ===== FORM PAGE ===== */
  .app {
    max-width: 700px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 8px 16px;
    margin-bottom: 20px;
  }

  .logo-badge span {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 42px);
    color: var(--text);
    line-height: 1.2;
  }

  .header p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
  }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .full { grid-column: 1 / -1; }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, select:focus {
    border-color: var(--gold);
  }

  input::placeholder { color: #444; }

  select option { background: var(--surface2); }

  .hint {
    font-size: 11px;
    color: #555;
    font-family: 'DM Mono', monospace;
  }

  /* OT rows */
  .ot-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 10px;
    align-items: end;
    margin-bottom: 10px;
  }

  .btn-remove {
    background: transparent;
    border: 1px solid #333;
    color: var(--red);
    border-radius: 8px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .btn-remove:hover { background: rgba(224,90,90,0.1); border-color: var(--red); }

  .btn-add {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-add:hover { border-color: var(--gold); color: var(--gold); }

  /* Summary bar */
  .summary-bar {
    background: var(--surface2);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .sum-item label { font-size: 10px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; }
  .sum-item .val {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: var(--gold);
    margin-top: 4px;
  }
  .sum-item.net .val { color: var(--green); font-size: 24px; }

  /* Generate button */
  .btn-generate {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .btn-generate:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.3);
  }

  /* ===== PAYSLIP PREVIEW ===== */
  #preview-page {
    display: none;
    background: var(--dark);
    min-height: 100vh;
    padding: 32px 20px 80px;
  }

  .preview-actions {
    max-width: 700px;
    margin: 0 auto 24px;
    display: flex;
    gap: 12px;
  }

  .btn-back {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 12px 20px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
  }

  .btn-back:hover { border-color: var(--gold); color: var(--gold); }

  .btn-pdf {
    flex: 1;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none;
    color: #000;
    border-radius: 10px;
    padding: 12px 20px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .btn-pdf:hover { opacity: 0.9; }

  /* ===== PAYSLIP DOCUMENT ===== */
  #payslip-doc {
    max-width: 700px;
    margin: 0 auto;
    background: #fff;
    color: #111;
    border-radius: 4px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  .ps-header {
    background: #1a1a1a;
    color: white;
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ps-company h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: #C9A84C;
  }

  .ps-company p {
    font-size: 11px;
    color: #888;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .ps-label {
    text-align: right;
  }

  .ps-label h3 {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #C9A84C;
  }

  .ps-label p {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }

  .ps-body { padding: 28px 32px; }

  .ps-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .ps-info-cell {
    padding: 10px 16px;
    border-bottom: 1px solid #e0e0e0;
    border-right: 1px solid #e0e0e0;
  }

  .ps-info-cell:nth-child(even) { border-right: none; }
  .ps-info-cell:nth-last-child(-n+2) { border-bottom: none; }

  .ps-info-cell label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #999;
    font-weight: 600;
    display: block;
    margin-bottom: 2px;
  }

  .ps-info-cell span {
    font-size: 13px;
    color: #111;
    font-weight: 500;
  }

  /* Earnings & Deductions table */
  .ps-table { width: 100%; border-collapse: collapse; margin-bottom: 0; }

  .ps-table-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    background: #1a1a1a;
    color: white;
    padding: 10px 16px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    border-radius: 6px 6px 0 0;
  }

  .ps-table-header span:not(:first-child) { text-align: right; }

  .ps-table-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    padding: 10px 16px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
  }

  .ps-table-row:last-child { border-bottom: none; }
  .ps-table-row span:not(:first-child) { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; }
  .ps-table-row.deduction span:not(:first-child) { color: #E05A5A; }
  .ps-table-row.highlight { background: #fafafa; }

  .ps-section-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #C9A84C;
    font-weight: 700;
    padding: 12px 16px 4px;
    background: #fdf9f0;
    border-bottom: 1px solid #f0e8d0;
  }

  .ps-table-wrap {
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  /* Net Pay Box */
  .ps-net {
    background: #1a1a1a;
    color: white;
    border-radius: 6px;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .ps-net-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
  }

  .ps-net-amount {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: #C9A84C;
  }

  .ps-net-words {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    font-style: italic;
  }

  /* Signatures */
  .ps-sigs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 12px;
  }

  .ps-sig {
    border-top: 1px solid #ccc;
    padding-top: 8px;
  }

  .ps-sig label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #999;
    display: block;
    margin-bottom: 2px;
  }

  .ps-sig span { font-size: 12px; color: #555; }

  .ps-footer {
    background: #f8f8f8;
    border-top: 1px solid #e0e0e0;
    padding: 12px 32px;
    text-align: center;
    font-size: 10px;
    color: #aaa;
    letter-spacing: 1px;
  }

  /* ===== PRINT ===== */
  @media print {
    body { background: white !important; }
    #form-page, .preview-actions { display: none !important; }
    #preview-page { display: block !important; padding: 0 !important; background: white !important; }
    #payslip-doc { max-width: 100% !important; box-shadow: none !important; border-radius: 0 !important; }
    .ps-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .ps-net { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .ps-section-label { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .ps-table-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  @media (max-width: 500px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .ot-row { grid-template-columns: 1fr 1fr; }
    .ot-row .field:last-of-type { grid-column: 1 / -1; }
    .summary-bar { grid-template-columns: 1fr; }
    .ps-info-grid { grid-template-columns: 1fr; }
    .ps-info-cell:nth-child(even) { border-right: none; }
    .ps-info-cell:nth-last-child(-n+2) { border-bottom: 1px solid #e0e0e0; }
    .ps-info-cell:last-child { border-bottom: none; }
    .ps-table-header { font-size: 8px; }
    .ps-net-amount { font-size: 24px; }
    .ps-sigs { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ===== FORM PAGE ===== -->
<div id="form-page">
<div class="app">

  <div class="header">
    <div class="logo-badge">
      <span>⬡ GymPark Fitness</span>
    </div>
    <h1>Pay Slip Generator</h1>
    <p>Fill in the details — we'll generate a clean payslip instantly</p>
  </div>

  <!-- Employee Info -->
  <div class="section">
    <div class="section-title">Employee Information</div>
    <div class="grid-2">
      <div class="field full">
        <label>Full Name</label>
        <input type="text" id="emp-name" placeholder="e.g. NAME">
      </div>
      <div class="field">
        <label>Staff No.</label>
        <input type="text" id="emp-staff" placeholder="e.g. RH00176">
      </div>
      <div class="field">
        <label>Passport / IC No.</label>
        <input type="text" id="emp-passport" placeholder="e.g. E0000">
      </div>
      <div class="field">
        <label>Position</label>
        <input type="text" id="emp-position" placeholder="e.g. Admin">
      </div>
      <div class="field">
        <label>Nationality</label>
        <input type="text" id="emp-nationality" placeholder="e.g. Bangladeshi">
      </div>
    </div>
  </div>

  <!-- Pay Period -->
  <div class="section">
    <div class="section-title">Pay Period</div>
    <div class="grid-2">
      <div class="field">
        <label>Pay Period (Month)</label>
        <input type="month" id="pay-period">
      </div>
      <div class="field">
        <label>Payment Date</label>
        <input type="date" id="pay-date">
      </div>
    </div>
  </div>

  <!-- Earnings -->
  <div class="section">
    <div class="section-title">Earnings</div>
    <div class="grid-2">
      <div class="field">
        <label>Basic Salary (RM)</label>
        <input type="number" id="basic-salary" placeholder="1700.00" oninput="calculate()">
      </div>
      <div class="field">
        <label>Cleaning Allowance (RM)</label>
        <input type="number" id="cleaning-allow" placeholder="0.00" oninput="calculate()">
      </div>
    </div>

    <div style="margin-top:20px;">
      <div class="section-title" style="font-size:10px; color: var(--muted);">Overtime / Extra Shifts</div>
      <div id="ot-rows"></div>
      <button class="btn-add" onclick="addOT()">＋ Add Overtime / Extra Shift</button>
    </div>

    <!-- Other additions -->
    <div style="margin-top:20px;">
      <div class="section-title" style="font-size:10px; color: var(--muted);">Other Additions</div>
      <div class="grid-2">
        <div class="field">
          <label>Amount (RM)</label>
          <input type="number" id="other-add" placeholder="0.00" oninput="calculate()">
        </div>
        <div class="field">
          <label>Reason</label>
          <input type="text" id="other-add-label" placeholder="e.g. Bonus, Incentive...">
        </div>
      </div>
    </div>
  </div>

  <!-- Deductions -->
  <div class="section">
    <div class="section-title">Deductions</div>
    <div class="grid-3">
      <div class="field">
        <label>EPF (RM)</label>
        <input type="number" id="epf" placeholder="0.00" oninput="calculate()">
      </div>
      <div class="field">
        <label>SOCSO (RM)</label>
        <input type="number" id="socso" placeholder="0.00" oninput="calculate()">
      </div>
      <div class="field">
        <label>Excess Leave (RM)</label>
        <input type="number" id="excess-leave" placeholder="0.00" oninput="calculate()">
      </div>
      <div class="field">
        <label>Salary Advance (RM)</label>
        <input type="number" id="salary-advance" placeholder="0.00" oninput="calculate()">
      </div>
      <div class="field">
        <label>Other Deduction (RM)</label>
        <input type="number" id="other-ded" placeholder="0.00" oninput="calculate()">
      </div>
      <div class="field">
        <label>Other Ded. Label</label>
        <input type="text" id="other-ded-label" placeholder="e.g. Loan...">
      </div>
    </div>
  </div>

  <!-- Bank -->
  <div class="section">
    <div class="section-title">Bank Details</div>
    <div class="grid-2">
      <div class="field">
        <label>Bank Name</label>
        <input type="text" id="bank-name" placeholder="e.g. Maybank">
      </div>
      <div class="field">
        <label>Account Number</label>
        <input type="text" id="bank-acc" placeholder="e.g. 1701966860​7">
      </div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-bar">
    <div class="sum-item">
      <label>Total Earnings</label>
      <div class="val" id="sum-earn">RM 0.00</div>
    </div>
    <div class="sum-item">
      <label>Total Deductions</label>
      <div class="val" id="sum-ded" style="color:#E05A5A">RM 0.00</div>
    </div>
    <div class="sum-item net">
      <label>Net Pay</label>
      <div class="val" id="sum-net">RM 0.00</div>
    </div>
  </div>

  <button class="btn-generate" onclick="generateSlip()">Generate Pay Slip →</button>

</div>
</div>

<!-- ===== PREVIEW PAGE ===== -->
<div id="preview-page">
  <div class="preview-actions">
    <button class="btn-back" onclick="goBack()">← Back</button>
    <button class="btn-pdf" onclick="downloadPDF()">⬇ Download / Print PDF</button>
  </div>

  <div id="payslip-doc">
    <!-- Filled dynamically -->
  </div>
</div>

<script>
// ===== OT MANAGEMENT =====
let otRows = [];

function addOT() {
  const id = Date.now();
  otRows.push(id);
  renderOTRows();
}

function removeOT(id) {
  otRows = otRows.filter(r => r !== id);
  renderOTRows();
  calculate();
}

function renderOTRows() {
  const container = document.getElementById('ot-rows');
  container.innerHTML = otRows.map(id => `
    <div class="ot-row" id="ot-${id}">
      <div class="field">
        <label>Description</label>
        <input type="text" id="ot-desc-${id}" placeholder="e.g. Normal OT" oninput="calculate()">
      </div>
      <div class="field">
        <label>Hours / Units</label>
        <input type="number" id="ot-hrs-${id}" placeholder="0" oninput="calculate()">
      </div>
      <div class="field">
        <label>Rate / Hour (RM)</label>
        <input type="number" id="ot-rate-${id}" placeholder="0.00" oninput="calculate()">
      </div>
      <button class="btn-remove" onclick="removeOT(${id})">×</button>
    </div>
  `).join('');
}

// ===== CALCULATION =====
function v(id) { return parseFloat(document.getElementById(id)?.value) || 0; }
function t(id) { return document.getElementById(id)?.value?.trim() || ''; }

function getOTTotal() {
  return otRows.reduce((sum, id) => {
    const hrs = parseFloat(document.getElementById(`ot-hrs-${id}`)?.value) || 0;
    const rate = parseFloat(document.getElementById(`ot-rate-${id}`)?.value) || 0;
    return sum + hrs * rate;
  }, 0);
}

function calculate() {
  const earnings = v('basic-salary') + v('cleaning-allow') + v('aircon') + v('other-add') + getOTTotal();
  const deductions = v('epf') + v('socso') + v('excess-leave') + v('salary-advance') + v('other-ded');
  const net = earnings - deductions;

  document.getElementById('sum-earn').textContent = `RM ${earnings.toFixed(2)}`;
  document.getElementById('sum-ded').textContent = `RM ${deductions.toFixed(2)}`;
  document.getElementById('sum-net').textContent = `RM ${net.toFixed(2)}`;
}

// ===== NUMBER TO WORDS =====
function numToWords(n) {
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine',
    'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen',
    'Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];

  if (n === 0) return 'Zero';

  function convert(num) {
    if (num < 20) return ones[num];
    if (num < 100) return tens[Math.floor(num/10)] + (num%10 ? ' ' + ones[num%10] : '');
    if (num < 1000) return ones[Math.floor(num/100)] + ' Hundred' + (num%100 ? ' ' + convert(num%100) : '');
    if (num < 1000000) return convert(Math.floor(num/1000)) + ' Thousand' + (num%1000 ? ' ' + convert(num%1000) : '');
    return convert(Math.floor(num/1000000)) + ' Million' + (num%1000000 ? ' ' + convert(num%1000000) : '');
  }

  const intPart = Math.floor(n);
  const decPart = Math.round((n - intPart) * 100);
  let words = convert(intPart);
  if (decPart > 0) words += ` and Cents ${convert(decPart)}`;
  return words + ' Only';
}

// ===== FORMAT MONTH =====
function formatMonth(str) {
  if (!str) return '—';
  const [y, m] = str.split('-');
  const months = ['January','February','March','April','May','June',
    'July','August','September','October','November','December'];
  return `${months[parseInt(m)-1]} ${y}`;
}

function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('en-MY', { day:'2-digit', month:'short', year:'numeric' });
}

// ===== GENERATE =====
function generateSlip() {
  const name = t('emp-name') || 'N/A';
  const staff = t('emp-staff') || '—';
  const passport = t('emp-passport') || '—';
  const position = t('emp-position') || '—';
  const nationality = t('emp-nationality') || '—';
  const period = formatMonth(t('pay-period'));
  const payDate = formatDate(t('pay-date'));
  const bankName = t('bank-name') || '—';
  const bankAcc = t('bank-acc') || '—';

  const basic = v('basic-salary');
  const cleaning = v('cleaning-allow');
  const aircon = 0;
  const otherAdd = v('other-add');
  const otherAddLabel = t('other-add-label') || 'Other Addition';

  const epf = v('epf');
  const socso = v('socso');
  const excessLeave = v('excess-leave');
  const salaryAdv = v('salary-advance');
  const otherDed = v('other-ded');
  const otherDedLabel = t('other-ded-label') || 'Other Deduction';

  const otTotal = getOTTotal();
  const totalEarnings = basic + cleaning + otherAdd + otTotal;
  const totalDeductions = epf + socso + excessLeave + salaryAdv + otherDed;
  const netPay = totalEarnings - totalDeductions;

  // OT rows HTML
  let otHTML = '';
  otRows.forEach(id => {
    const desc = document.getElementById(`ot-desc-${id}`)?.value || 'Overtime';
    const hrs = parseFloat(document.getElementById(`ot-hrs-${id}`)?.value) || 0;
    const rate = parseFloat(document.getElementById(`ot-rate-${id}`)?.value) || 0;
    const amt = hrs * rate;
    otHTML += `
      <div class="ps-table-row">
        <span>${desc}</span>
        <span>${hrs} hrs × RM ${rate.toFixed(2)}/hr</span>
        <span>RM ${amt.toFixed(2)}</span>
      </div>`;
  });

  const slip = `
    <div class="ps-header">
      <div class="ps-company">
        <h2>GYMPARK FITNESS</h2>
        <p>SA0014301-A</p>
      </div>
      <div class="ps-label">
        <h3>Pay Slip</h3>
        <p>Generated ${new Date().toLocaleDateString('en-MY')}</p>
      </div>
    </div>

    <div class="ps-body">

      <div class="ps-info-grid">
        <div class="ps-info-cell"><label>Employee Name</label><span>${name}</span></div>
        <div class="ps-info-cell"><label>Pay Period</label><span>End ${period}</span></div>
        <div class="ps-info-cell"><label>Staff No.</label><span>${staff}</span></div>
        <div class="ps-info-cell"><label>Payment Date</label><span>${payDate}</span></div>
        <div class="ps-info-cell"><label>Position</label><span>${position}</span></div>
        <div class="ps-info-cell"><label>Nationality</label><span>${nationality}</span></div>
        <div class="ps-info-cell"><label>Passport / IC</label><span>${passport}</span></div>
        <div class="ps-info-cell"><label>Bank Account</label><span>${bankName} — ${bankAcc}</span></div>
      </div>

      <div class="ps-table-wrap">
        <div class="ps-section-label">Earnings</div>
        <div class="ps-table-header">
          <span>Description</span><span>Details</span><span>Amount</span>
        </div>
        <div class="ps-table-row">
          <span>Basic Salary</span><span>—</span><span>RM ${basic.toFixed(2)}</span>
        </div>
        ${cleaning > 0 ? `<div class="ps-table-row"><span>Cleaning Allowance</span><span>—</span><span>RM ${cleaning.toFixed(2)}</span></div>` : ''}
        ${otHTML}
        ${aircon > 0 ? `<div class="ps-table-row"><span>Aircon PMT</span><span>—</span><span>RM ${aircon.toFixed(2)}</span></div>` : ''}
        ${otherAdd > 0 ? `<div class="ps-table-row"><span>${otherAddLabel}</span><span>—</span><span>RM ${otherAdd.toFixed(2)}</span></div>` : ''}

        <div class="ps-section-label">Deductions</div>
        ${epf > 0 ? `<div class="ps-table-row deduction"><span>EPF (Employee)</span><span>—</span><span>- RM ${epf.toFixed(2)}</span></div>` : ''}
        ${socso > 0 ? `<div class="ps-table-row deduction"><span>SOCSO</span><span>—</span><span>- RM ${socso.toFixed(2)}</span></div>` : ''}
        ${excessLeave > 0 ? `<div class="ps-table-row deduction"><span>Excess Leave</span><span>—</span><span>- RM ${excessLeave.toFixed(2)}</span></div>` : ''}
        ${salaryAdv > 0 ? `<div class="ps-table-row deduction"><span>Salary Advance</span><span>—</span><span>- RM ${salaryAdv.toFixed(2)}</span></div>` : ''}
        ${otherDed > 0 ? `<div class="ps-table-row deduction"><span>${otherDedLabel}</span><span>—</span><span>- RM ${otherDed.toFixed(2)}</span></div>` : ''}

        <div class="ps-section-label" style="background:#f0f0f0; color:#333; display:grid; grid-template-columns:1fr 1fr 1fr; padding: 10px 16px;">
          <span></span>
          <span style="font-size:10px; letter-spacing:1px;">TOTAL EARNINGS: RM ${totalEarnings.toFixed(2)}</span>
          <span style="font-size:10px; letter-spacing:1px; color:#E05A5A;">TOTAL DEDUCTIONS: RM ${totalDeductions.toFixed(2)}</span>
        </div>
      </div>

      <div class="ps-net">
        <div>
          <div class="ps-net-label">Net Pay (A – B)</div>
          <div class="ps-net-words">${numToWords(netPay)}</div>
        </div>
        <div class="ps-net-amount">RM ${netPay.toFixed(2)}</div>
      </div>

      <div class="ps-sigs">
        <div class="ps-sig">
          <div style="height:40px;"></div>
          <label>Prepared By</label>
          <span>................................</span>
        </div>
        <div class="ps-sig">
          <div style="height:40px;"></div>
          <label>Employee's Signature</label>
          <span>................................</span>
        </div>
      </div>

    </div>

    <div class="ps-footer">
      This is a computer-generated pay slip. No signature required unless stated. · GymPark Fitness © ${new Date().getFullYear()}
    </div>
  `;

  document.getElementById('payslip-doc').innerHTML = slip;
  document.getElementById('form-page').style.display = 'none';
  document.getElementById('preview-page').style.display = 'block';
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('preview-page').style.display = 'none';
  document.getElementById('form-page').style.display = 'block';
}

function downloadPDF() {
  window.print();
}

// Init
renderOTRows();
</script>
</body>
</html>
